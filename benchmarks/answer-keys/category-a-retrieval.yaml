# Category A — Retrieval Facts (Machine-Gradable)
# Tests whether project knowledge search returns correct factual content.
# Grading: exact match or contains-based. No human judgment needed.
#
# Update protocol: When a milestone changes a fact (e.g., field count increases),
# update the expected answer AND note the milestone that changed it.

questions:

  # ─── Field Counts ────────────────────────────────────────────────────────
  - id: "A-001"
    question: "How many fields does EventEnvelope have?"
    expected:
      exact: "14"
    source: "event-model/MODULE_CONTEXT.md"
    added: "2026-05-17"
    notes: "14th field is actorRef (promoted from CausalContext)"

  - id: "A-002"
    question: "How many fields does CausalContext have?"
    expected:
      exact: "2"
    source: "event-model/MODULE_CONTEXT.md"
    added: "2026-05-17"
    notes: "correlationId + causationId. actorRef was promoted to EventEnvelope."

  - id: "A-003"
    question: "How many fields does EventDraft have?"
    expected:
      exact: "9"
    source: "event-model/MODULE_CONTEXT.md"
    added: "2026-05-17"
    notes: "8th=actorRef, 9th=idempotencyKey (AMD-35)"

  - id: "A-004"
