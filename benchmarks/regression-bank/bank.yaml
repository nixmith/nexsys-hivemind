# Regression Bank — Permanent Test Fixtures
#
# Every benchmark failure becomes a regression test. These run before
# major benchmarks and after Knowledge Primer / MODULE_CONTEXT updates.
#
# A regression is RETIRED (not deleted) when the underlying feature changes
# so fundamentally that the question is no longer meaningful.

questions:

  # ─── From Benchmark 4 (2026-05-17) ──────────────────────────────────────

  - id: "REG-001"
    origin: "Benchmark 4, Q10"
    failure_class: "retrieval"
    date_added: "2026-05-17"
    question: "What is the exact ordering between ConfigurationChangeListener and the config_changed domain event? Which fires first?"
    expected:
      contains_all: ["synchronously", "before"]
      contains_any: ["ConfigurationChangeListener fires first", "listener fires before", "synchronously before the config_changed event"]
      must_not_contain: ["uncertain", "not specified", "unknown", "unclear"]
    source: "Knowledge Primer — 'Cross-module contract traps' AND 'Configuration Reload Contract' sections"
    verification_note: |
      This answer appears in TWO separate Knowledge Primer sections:
      1. Line 237: "ConfigurationChangeListener fires synchronously before the config_changed event"
      2. Lines 267-271: The numbered Configuration Reload Contract (3-step ordering)
      If the Claude Project says UNCERTAIN, it's a retrieval failure — the data is present.

  - id: "REG-002"
    origin: "Benchmark 4, Q22"
    failure_class: "enforcement_mechanism_confusion"
    date_added: "2026-05-17"
    question: "What does the NO_SYNCHRONIZED_METHODS ArchUnit rule detect? What does it NOT detect? How is the gap covered?"
    expected:
      contains_all: ["methods only", "not blocks"]
      contains_any: ["grep", "CI", "grep in CI"]
      must_not_contain: ["blocks", "catches both", "synchronized blocks"]
    source: "HomeSynapseArchRules.java source comment (lines 49-50)"
    verification_note: |
      The source code comment explicitly states:
      "NOTE: This catches synchronized METHODS only. Synchronized blocks
      are bytecode-level and not detectable via reflection/ArchUnit.
      Synchronized blocks are enforced by grep in CI."

  - id: "REG-003"
    origin: "Benchmark 4, Q43"
    failure_class: "ghost_rule_stale_belief"
    date_added: "2026-05-17"
    question: "How many ArchUnit rules exist in HomeSynapseArchRules.java? Does the event-bus module have its own ArchUnit rule for JDBC isolation?"
    expected:
      contains_any: ["7"]
      contains_any_2: ["no", "does not", "JPMS", "module-info"]
      must_not_contain: ["8", "EVENT_BUS_DOES_NOT_IMPORT", "event-bus has its own", "belt-and-braces"]
    source: "HomeSynapseArchRules.java, event-bus/src/test/ (no ArchUnit files), Knowledge Primer"
    verification_note: |
      Root cause: M3 Plan §4.5 prescribed this as an ArchUnit rule.
      Implementation used JPMS instead. The Plan hasn't been corrected yet.
      If this regression fails, the stale Plan reference is still winning
      over the Knowledge Primer's "JPMS-enforced" statement.

  # ─── From Benchmark 1 (2026-03-21) — Retroactive ────────────────────────

  - id: "REG-010"
    origin: "Benchmark 1 (authority chain failures)"
    failure_class: "withdrawn_amendment_as_applied"
    date_added: "2026-05-17"
    question: "Is AMD-39 applied or withdrawn? What journal_size_limit value is in effect across all DeploymentProfile values?"
    expected:
      contains_any: ["withdrawn", "WITHDRAWN"]
      contains_any_2: ["6 MB", "6,144,000", "6144000"]
      must_not_contain: ["applied", "64 MB", "raised"]
    source: "Knowledge Primer, Navigation Index AMD status"
    verification_note: "Benchmark 1 failure pattern: treating withdrawn amendments as applied."

  # ─── From Benchmark 2 (2026-04-08) — Retroactive ────────────────────────

  - id: "REG-020"
    origin: "Benchmark 2 (source verification failures)"
    failure_class: "count_without_verification"
    date_added: "2026-05-17"
    question: "How many parameters does EventPublisher.publishRoot() take? Where does actorRef come from?"
    expected:
      contains_any: ["1", "one"]
      contains_any_2: ["EventDraft", "from the draft", "field 8"]
      must_not_contain: ["2", "two", "second parameter"]
    source: "EventPublisher.java (verified), Knowledge Primer"
    verification_note: "Benchmark 2 pattern: stating counts without opening the source file."

